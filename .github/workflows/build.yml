name: Утренний морской обзор

on:
  schedule:
    - cron: '40 4 * * *'   # 07:40 по Москве, страница готова к 08:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Собрать обзор
        run: python build_review.py

      - name: Опубликовать
        run: |
          git config user.name "sea-review-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Обзор за $(TZ=Europe/Moscow date +%d.%m.%Y)"
          git push
